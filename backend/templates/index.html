<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PropCare AI Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#1f2937;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.dashboard{
display:grid;
grid-template-columns: repeat(3,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{
margin:0;
color:#374151;
}

.card p{
font-size:28px;
color:#2563eb;
margin-top:10px;
}

.section{
background:white;
padding:20px;
margin-bottom:25px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#f3f4f6;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

input{
padding:8px;
margin:5px;
}

/* AI bubble */

#ai-bubble{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#2563eb;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* AI window */

#ai-window{
position:fixed;
bottom:100px;
right:25px;
width:340px;
height:420px;
background:white;
border-radius:10px;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
display:none;
flex-direction:column;
}

#chat-header{
background:#2563eb;
color:white;
padding:12px;
border-top-left-radius:10px;
border-top-right-radius:10px;
}

#chat-box{
flex:1;
padding:10px;
overflow-y:auto;
font-size:14px;
}

.chat-user{
color:#2563eb;
margin-bottom:10px;
}

.chat-ai{
color:#059669;
margin-bottom:10px;
}

#chat-input{
display:flex;
border-top:1px solid #ddd;
}

#ai-input{
flex:1;
padding:10px;
border:none;
outline:none;
}

#send-btn{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>PropCare AI</h1>
<p>AI-powered property maintenance assistant</p>
</header>

<div class="container">

<h2>Dashboard</h2>

<div class="dashboard">

<div class="card">
<h3>Total Properties</h3>
<p id="total-properties">0</p>
</div>

<div class="card">
<h3>Total Services</h3>
<p id="total-services">0</p>
</div>

<div class="card">
<h3>Completed Services</h3>
<p id="completed-services">0</p>
</div>

</div>

<!-- PROPERTIES -->

<div class="section">

<h2>Properties</h2>

<button onclick="togglePropertyForm()">Add Property</button>

<div id="property-form" style="display:none">

<input id="property-name" placeholder="Property Name">
<input id="property-address" placeholder="Address">

<button onclick="addProperty()">Save Property</button>

</div>

<table id="properties-table">

<thead>
<tr>
<th>Name</th>
<th>Address</th>
<th>Actions</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<!-- PROVIDERS -->

<div class="section">

<h2>Providers</h2>

<button onclick="toggleProviderForm()">Add Provider</button>

<div id="provider-form" style="display:none">

<input id="provider-name" placeholder="Provider Name">
<input id="provider-service" placeholder="Service Type">

<button onclick="addProvider()">Save Provider</button>

</div>

<table id="providers-table">

<thead>
<tr>
<th>Name</th>
<th>Service</th>
<th>Actions</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<!-- SERVICES -->

<div class="section">

<h2>Services</h2>

<table id="services-table">

<thead>
<tr>
<th>Service</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<!-- AI CHAT -->

<div id="ai-window">

<div id="chat-header">
AI Assistant
</div>

<div id="chat-box"></div>

<div id="chat-input">

<input type="text" id="ai-input" placeholder="Ask for a service...">

<button id="send-btn" onclick="sendAIMessage()">Send</button>

</div>

</div>

<div id="ai-bubble" onclick="toggleChat()">💬</div>

<script>

function toggleChat(){

const chat=document.getElementById("ai-window")

chat.style.display = chat.style.display === "flex" ? "none" : "flex"

}

async function sendAIMessage(){

const input=document.getElementById("ai-input")
const chatBox=document.getElementById("chat-box")

const message=input.value

if(!message) return

chatBox.innerHTML+=`<div class="chat-user"><b>You:</b> ${message}</div>`

input.value=""

const response=await fetch("/api/ai/assistant",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt:message})
})

const data=await response.json()

let reply=""

if(data.response){reply=data.response}
if(data.message){reply=data.message}

if(data.providers){

reply+="<br><br><b>Providers:</b><br>"

data.providers.forEach(p=>{
reply+=`${p.name} ⭐${p.rating || "N/A"}<br>${p.address}<br><br>`
})

}

chatBox.innerHTML+=`<div class="chat-ai"><b>AI:</b> ${reply}</div>`

chatBox.scrollTop=chatBox.scrollHeight

}

function togglePropertyForm(){

const form=document.getElementById("property-form")

form.style.display=form.style.display==="none"?"block":"none"

}

async function addProperty(){

const name=document.getElementById("property-name").value
const address=document.getElementById("property-address").value

await fetch("/api/properties",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,address})
})

loadProperties()

}

async function deleteProperty(id){

await fetch(`/api/properties/${id}`,{
method:"DELETE"
})

loadProperties()

}

function toggleProviderForm(){

const form=document.getElementById("provider-form")

form.style.display=form.style.display==="none"?"block":"none"

}

async function addProvider(){

const name=document.getElementById("provider-name").value
const service=document.getElementById("provider-service").value

await fetch("/api/providers",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,service})
})

loadProviders()

}

async function deleteProvider(id){

await fetch(`/api/providers/${id}`,{
method:"DELETE"
})

loadProviders()

}

async function deleteService(id){

await fetch(`/api/services/${id}`,{
method:"DELETE"
})

loadServices()

}

async function loadProperties(){

const res=await fetch("/api/properties")
const data=await res.json()

const table=document.querySelector("#properties-table tbody")

table.innerHTML=""

data.forEach(p=>{

table.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.address}</td>
<td><button onclick="deleteProperty(${p.id})">Delete</button></td>
</tr>
`

})

}

async function loadProviders(){

const res=await fetch("/api/providers")
const data=await res.json()

const table=document.querySelector("#providers-table tbody")

table.innerHTML=""

data.forEach(p=>{

table.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.service}</td>
<td><button onclick="deleteProvider(${p.id})">Delete</button></td>
</tr>
`

})

}

async function loadServices(){

const res=await fetch("/api/services")
const data=await res.json()

const table=document.querySelector("#services-table tbody")

table.innerHTML=""

data.forEach(s=>{

table.innerHTML+=`
<tr>
<td>${s.type}</td>
<td>${s.status}</td>
<td><button onclick="deleteService(${s.id})">Delete</button></td>
</tr>
`

})

}

async function loadDashboard(){

const res=await fetch("/api/analytics/summary")
const data=await res.json()

document.getElementById("total-properties").innerText=data.total_properties
document.getElementById("total-services").innerText=data.total_services
document.getElementById("completed-services").innerText=data.completed_services

}

loadDashboard()
loadProperties()
loadProviders()
loadServices()

</script>

</body>
</html>
